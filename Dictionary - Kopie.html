<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario con Mistral</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-size: 20px;
            margin: 0; 
            padding: 20px; 
            background-color: #ffffff; 
            color: #333;
        }
        .container { max-width: 700px; margin: auto; text-align: center; }
        .search-group { display: flex; gap: 10px; margin-top: 20px; }
        input { 
            flex: 1; padding: 10px; border: 1.5px solid #4e4c4c; border-radius: 20px; 
            font-size: 16px; max-width: 500px; 
        }
        button { 
            padding: 10px 20px; background-color: #0056b3; color: white; 
            border: none; border-radius:  20px; cursor: pointer; font-weight: bold;
            font-size: 16px;
        }
        button:hover { background: #1a252f; }
        button:disabled { background-color: #cccccc; }
        #dictionary-box { 
            margin-top: 20px; padding: 20px; border: 1.5px solid #4e4c4c; 
            border-radius: 20px; text-align: left; min-height: 100px;
        }
        .term-title { color: #c0392b; font-size: 1.2rem; font-weight: bold; display: block; margin-bottom: 10px; }
        .def-text { line-height: 1.6; font-size: 1rem; }
        .footer-info { margin-top: 15px; font-size: 0.9rem; color: #999; border-top: 1px solid #eee; pt: 10px; }
    </style>
</head>
<body>

<div class="container">
    <p>Introduce el término que deseas consultar en el <br><strong>Diccionario Académico</strong>:</p>
    
    <div class="search-group">
        <input type="text" id="wordInput" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') getDefinition()">
        <button id="execBtn" onclick="getDefinition()">Consultar</button>
    </div>

    <div id="dictionary-box">
        <span style="color: #666; font-style: italic;">La definición aparecerá en este recuadro.</span>
    </div>

    <div class="footer-info">
        Si la consulta no carga automáticamente, verifica tu conexión a internet.
    </div>
</div>

<script>


async function getDefinition() {
    const term = document.getElementById('wordInput').value.trim();
    const box = document.getElementById('dictionary-box');
    const btn = document.getElementById('execBtn');

    // Configuración de API
    const API_KEY = "w8VGFPRhY6n9B6Ou41DNk7qSsF21jWw5";

    if (!term) return;

    btn.disabled = true;
    box.innerHTML = "Buscando en la base de datos...";

    try {
        const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: "mistral-tiny",
                messages: [
                    {
                        role: "system", 
                        content: "Eres un diccionario académico. Define la palabra de forma breve y formal. Usa negritas (**) para resaltar términos importantes o sinónimos."
                    },
                    {role: "user", content: `Define: ${term}`}
                ],
                temperature: 0.1
            })
        });

        const data = await response.json();
        let content = data.choices[0].message.content;

        // --- LÓGICA DE FORMATEO ---
        // 1. Convertimos los saltos de línea en <br>
        content = content.replace(/\n/g, '<br>');
        
        // 2. Convertimos **texto** en <b>texto</b> usando Regex
        content = content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

        box.innerHTML = `
            <span class="term-title">${term.toUpperCase()}</span>
            <div class="def-text">${content}</div>
        `;

    } catch (e) {
        box.innerHTML = "Error al conectar con el servicio. Inténtalo de nuevo.";
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
